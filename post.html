<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Article...</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600&family=Cinzel:wght@400;500;600;700;900&family=Jost:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/style.css" />

    <!-- Include Sanity Client & PortableText HTML transformer -->
    <script src="https://cdn.jsdelivr.net/npm/@sanity/client@6.15.2/dist/index.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@portabletext/to-html@2.0.13/dist/index.umd.min.js"></script>

    <!-- Include the Image URL Builder utility via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@sanity/image-url@1.0.2/dist/index.umd.min.js"></script>
</head>

<body>
    <nav id="mainNav">
        <a class="nav-logo" href="index.html#hero">Dr. Adeyemi Agbelusi</a>
        <ul class="nav-links">
            <li><a href="index.html#about">Profile</a></li>
            <li><a href="index.html#practice">Practice</a></li>
            <li><a href="index.html#credentials">Credentials</a></li>
            <li><a href="blog.html">Publications</a></li>
            <li><a href="index.html#videos">Media</a></li>
            <li><a href="index.html#contact">Contact</a></li>
        </ul>
        <a class="nav-cta" href="index.html#contact">Engage Dr. Agbelusi</a>
        <button class="hamburger" onclick="toggleMenu()" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>
    </nav>

    <section class="blog-layout">
        <p><a href="blog.html" class="back-link">← Back to Blog</a></p>

        <main id="article-wrapper">
            <h1 id="post-title" class="section-title">Loading...</h1>
            <div id="post-body"></div>
        </main>
    </section>

    <footer>
        <div class="footer-logo">Dr. Adeyemi Agbelusi</div>
        <ul class="footer-links">
            <li><a href="index.html#about">Profile</a></li>
            <li><a href="index.html#practice">Practice</a></li>
            <li><a href="index.html#credentials">Credentials</a></li>
            <li><a href="blog.html">Insights</a></li>
            <li><a href="index.html#contact">Contact</a></li>
        </ul>
        <p class="footer-copy">© 2026 Dr. Adeyemi Agbelusi. All Rights Reserved.</p>
    </footer>

    <script>
        const client = window.SanityClient.createClient({
            projectId: 'eswm8v8i', // Replace with your actual project ID
            dataset: 'production',
            useCdn: true,
            apiVersion: '2026-05-20'
        });

        // 1. Parse the '?slug=xxx' parameter out of the browser's address bar
        const urlParams = new URLSearchParams(window.location.search);
        const currentSlug = urlParams.get('slug');

        async function fetchSinglePost() {
            if (!currentSlug) {
                document.getElementById('post-title').innerText = "Post Not Found";
                return;
            }

            // GROQ query finding the single item matching the slug
            const query = `*[_type == "post" && slug.current == $slug][0]{
                title,
                body
            }`;

            try {
                const post = await client.fetch(query, { slug: currentSlug });

                if (!post) {
                    document.getElementById('post-title').innerText = "Post Not Found";
                    return;
                }

                // 2. Update page title and header text
                document.title = `${post.title} - My Blog`;
                document.getElementById('post-title').innerText = post.title;

                // 3. Convert Sanity Portable Text block data straight to native HTML strings
                if (post.body) {
                    const htmlContent = window.toHtml.toHTML(post.body);
                    document.getElementById('post-body').innerHTML = htmlContent;
                }
            } catch (error) {
                console.error("Error loading article:", error);
                document.getElementById('post-title').innerText = "Error loading article";
            }
        }

        fetchSinglePost();

        // Navigation script
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('mainNav');
            if (window.scrollY > 50) {
                nav.classList.add('scrolled');
            } else {
                nav.classList.remove('scrolled');
            }
        });

        function toggleMenu() {
            const navLinks = document.querySelector('.nav-links');
            const navCta = document.querySelector('.nav-cta');
            navLinks.style.display = navLinks.style.display === 'flex' ? 'none' : 'flex';
            navCta.style.display = navCta.style.display === 'block' ? 'none' : 'block';
        }

        const query = `*[_type == "post" && slug.current == $slug][0]{
    title,
    mainImage,
    body
}`;

        const post = await client.fetch(query, { slug: currentSlug });

        if (post.mainImage) {
            const heroUrl = urlFor(post.mainImage).width(1200).height(500).url();

            const imgTag = document.createElement('img');
            imgTag.src = heroUrl;
            imgTag.className = 'blog-hero-banner';
            imgTag.alt = post.title;

            // Insert image tag cleanly right before your title header text element
            const wrapper = document.getElementById('article-wrapper');
            wrapper.insertBefore(imgTag, document.getElementById('post-title'));
        }
    </script>
</body>

</html>
